<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UNITYVERSE · Elite Pickup Soccer Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --royal: #0033a0;
      --royal-soft: rgba(0,51,160,0.6);
      --gold: #d4af37;
      --gold-soft: rgba(212,175,55,0.35);
      --red: #c1121f;
      --bg: #050509;
      --bg-alt: #0b0c12;
      --card: #10121b;
      --border: #222433;
      --text: #f5f5f7;
      --muted: #9ca3b5;
      --shadow: 0 22px 60px rgba(0,0,0,0.75);
      --radius-lg: 18px;
      --radius-md: 14px;
      --bottom-nav-height: 60px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,51,160,0.45), transparent 55%),
        radial-gradient(circle at bottom right, rgba(193,18,31,0.45), transparent 55%),
        #020308;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Top bar */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(22px);
      background: linear-gradient(to right, rgba(5,6,12,0.96), rgba(5,6,12,0.82));
      border-bottom: 1px solid rgba(212,175,55,0.25);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .crest {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background:
        radial-gradient(circle at 30% 20%, #ffffff, #f5f5f7 18%, #d4af37 19%, #10121b 60%),
        linear-gradient(135deg, #0033a0, #000814);
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.7),
        0 10px 24px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }
    .crest-inner-v {
      position: absolute;
      inset: 6px;
      border-radius: 10px;
      border: 2px solid rgba(212,175,55,0.9);
      clip-path: polygon(50% 100%, 0 0, 18% 0, 50% 70%, 82% 0, 100% 0);
    }
    .crest-inner-u {
      position: absolute;
      inset: 7px;
      border-radius: 10px;
      border: 2px solid rgba(0,51,160,0.9);
      clip-path: polygon(0 0, 0 60%, 20% 100%, 80% 100%, 100% 60%, 100 0, 82% 0, 82% 58%, 70% 80%, 30% 80%, 18% 58%, 18% 0);
    }
