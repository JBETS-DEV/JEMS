<!DOCTYPE html>
<html lang="en">
<head>

  <title>UNITYVERSE · Where Passion Meets Respect and Fun!!!</title>

  <style>
    :root {
      --royal: #0033a0;

      --bg: #050509;
      --text: #f5f5f7;
      --muted: #9ca3b5;
      --shadow: 0 22px 60px rgba(0,0,0,0.75);

      --bottom-nav-height: 64px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;

      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--gold); text-decoration: none; }
    header {
      position: sticky; top: 0; z-index: 40;
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;

      background: linear-gradient(to right, rgba(5,6,12,0.96), rgba(5,6,12,0.82));
      border-bottom: 1px solid rgba(212,175,55,0.25);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-name { font-weight: 800; letter-spacing: 0.08em; font-size: 0.9rem; text-transform: uppercase; color: #f9fafb; }
    .brand-tagline { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .pill { padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(212,175,55,0.6); background: radial-gradient(circle at top left, rgba(212,175,55,0.18), transparent 60%); font-size: 0.7rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; box-shadow: 0 0 0 4px rgba(22,163,74,0.35); }
    .avatar { width: 30px; height: 30px; border-radius: 999px; background: radial-gradient(circle at 30% 20%, #ffffff, #d4af37 40%, #0033a0 80%); box-shadow: 0 0 0 1px rgba(212,175,55,0.7); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #020617; }
    main { flex: 1; padding: 12px 12px calc(var(--bottom-nav-height) + 16px); max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: minmax(0, 2.2fr) minmax(0, 1.4fr); gap: 12px; }
    @media (max-width: 900px){ main{ grid-template-columns: 1fr; } }
    .card { background: rgba(5,6,15,0.96); border-radius: var(--radius-lg); border: 1px solid rgba(34,36,51,0.9); box-shadow: var(--shadow); padding: 14px; }
    .card-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); }
    .hero-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
    .hero-stat { padding: 8px; border-radius: 12px; background: rgba(15,23,42,0.9); border: 1px solid rgba(75,85,99,0.9); display: flex; flex-direction: column; gap: 2px; }
    .hero-stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .hero-stat-value { font-size: 0.9rem; font-weight: 700; }
    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; height: var(--bottom-nav-height); background: rgba(15,23,42,0.96); border-top: 1px solid rgba(31,41,55,0.95); display: flex; align-items: center; justify-content: space-around; padding: 6px 10px; z-index: 50; backdrop-filter: blur(18px); }
    .bottom-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.65rem; color: var(--muted); cursor: pointer; }
    .bottom-item.active { color: #fef9c3; }
  </style>
</head>
