<!-- UNITYVERSE CREST LOGO -->
<svg width="180" height="200" viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="uvGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1b2550" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050712" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="uvGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C89A00"/>
    </linearGradient>

    <linearGradient id="uvNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E2D"/>
      <stop offset="100%" stop-color="#02030A"/>
    </linearGradient>
  </defs>

  <!-- Crest background -->
  <rect x="0" y="0" width="180" height="200" rx="24" fill="url(#uvGlow)"/>

  <!-- V arms (embracing) -->
  <path
    d="M20 30 L55 30 L90 135 L125 30 L160 30 L105 180 L75 180 Z"
    fill="url(#uvGold)"
    stroke="#F5E6A0"
    stroke-width="2"
  />

  <!-- U shape inside -->
  <path
    d="M55 60
       Q55 40 75 40
       L105 40
       Q125 40 125 60
       L125 115
       Q125 135 115 145
       Q105 155 90 155
       Q75 155 65 145
       Q55 135 55 115 Z"
    fill="url(#uvNavy)"
    stroke="#1F2A5C"
    stroke-width="2"
  />

  <!-- Soccer ball (simplified but realistic enough for now) -->
  <circle cx="90" cy="100" r="22" fill="#FDFDFD" stroke="#D0D0D0" stroke-width="2"/>
  <!-- Ball patches -->
  <polygon points="90,82 100,90 96,102 84,102 80,90"
           fill="#111111"/>
  <path d="M90 82 L80 90 L72 86" stroke="#111111" stroke-width="1.5" fill="none"/>
  <path d="M90 82 L100 90 L108 86" stroke="#111111" stroke-width="1.5" fill="none"/>
  <path d="M80 90 L76 102 L82 112" stroke="#111111" stroke-width="1.5" fill="none"/>
  <path d="M100 90 L104 102 L98 112" stroke="#111111" stroke-width="1.5" fill="none"/>
  <path d="M84 102 L90 112 L96 102" stroke="#111111" stroke-width="1.5" fill="none"/>

  <!-- UNITYVERSE wordmark -->
  <text x="50%" y="190" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        fill="#FDFDFD"
        letter-spacing="2">
    UNITYVERSE
  </text>
</svg>
